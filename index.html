<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nothing here</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080808;
      --text: #c8c8c0;
      --muted: #333330;
      --mid: #555550;
      --accent: #e8e0c8;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
        font-family: 'DM Mono', system-ui, "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", monospace;
      overflow: hidden;
    }

    /* on touch devices, show default cursor */
    @media (pointer: fine) {
      body { cursor: none; }
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.022;
      pointer-events: none;
      z-index: 1;
    }

    /* custom cursor — hidden on touch */
    .cursor, .cursor-ring {
      display: none;
    }
    @media (pointer: fine) {
      .cursor {
        display: block;
        position: fixed;
        width: 5px;
        height: 5px;
        background: var(--accent);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        mix-blend-mode: difference;
      }
      .cursor-ring {
        display: block;
        position: fixed;
        width: 26px;
        height: 26px;
        border: 1px solid rgba(232,224,200,0.25);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
      }
    }

    .corner {
      position: fixed;
      width: 28px;
      height: 28px;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
    }
    .corner--tl { top: 20px; left: 20px; border-top: 1px solid var(--muted); border-left: 1px solid var(--muted); }
    .corner--tr { top: 20px; right: 20px; border-top: 1px solid var(--muted); border-right: 1px solid var(--muted); }
    .corner--bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--muted); border-left: 1px solid var(--muted); }
    .corner--br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--muted); border-right: 1px solid var(--muted); }

    @media (min-width: 480px) {
      .corner { width: 36px; height: 36px; }
      .corner--tl, .corner--tr { top: 24px; }
      .corner--bl, .corner--br { bottom: 24px; }
      .corner--tl, .corner--bl { left: 24px; }
      .corner--tr, .corner--br { right: 24px; }
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      padding: 60px 24px;
    }

    .card {
      text-align: center;
      width: 100%;
      max-width: 560px;
    }

    .headline {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(1.9rem, 8vw, 4.2rem);
      color: var(--accent);
      line-height: 1.18;
      letter-spacing: -0.01em;
      margin-bottom: clamp(20px, 4vw, 32px);
      opacity: 0;
      animation: slideUp 1s 0.2s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .headline .emoji {
      font-style: normal;
      display: inline-block;
      animation: emojiFloat 4s 2s ease-in-out infinite;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--muted);
      margin: 0 auto clamp(20px, 3vw, 28px);
      opacity: 0;
      animation: scaleIn 0.8s 0.9s ease forwards;
    }

    .log {
      font-size: clamp(10px, 2.5vw, 11px);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--mid);
      line-height: 2.2;
      opacity: 0;
      animation: slideUp 0.9s 1s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .log-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .log span.label { color: var(--muted); }
    .log span.val   { color: var(--text); }
    .log span.dim   { color: var(--muted); font-style: italic; }

    .bottom-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(8px, 2vw, 9px);
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1.6s 1.4s ease forwards;
      white-space: nowrap;
    }

    /* on touch: swap coords for a static message */
    .bottom-bar--touch { display: none; }
    @media (pointer: coarse) {
      .bottom-bar--mouse  { display: none; }
      .bottom-bar--touch  { display: block; }
    }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scaleX(0); }
      to   { opacity: 1; transform: scaleX(1); }
    }
    @keyframes emojiFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="ring"></div>

  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <div class="stage">
    <div class="card">
      <h1 class="headline">
        Hi — I'm sorry<br>there's nothing here
      </h1>
      <div class="divider"></div>
      <div class="log">
        <div class="log-row"><span class="label">status</span><span class="val">alive, unfortunately</span></div>
        <div class="log-row"><span class="label">content</span><span class="val">none. clearly.</span></div>
        <div class="log-row"><span class="label">plans</span><span class="val">several, all vague</span></div>
        <div class="log-row"><span class="label">eta</span><span class="dim">don't ask</span></div>
      </div>
    </div>
  </div>

  <div class="bottom-bar bottom-bar--mouse" id="coords">x: — &nbsp;·&nbsp; y: —</div>
  <div class="bottom-bar bottom-bar--touch">you found me · congrats ig</div>

  <script>
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('ring');
    const coords = document.getElementById('coords');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
      coords.textContent = `x: ${mx}  ·  y: ${my}`;
    });

    (function animateRing() {
      rx += (mx - rx) * 0.1;
      ry += (my - ry) * 0.1;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(animateRing);
    })();
  </script>
</body>
</html>
